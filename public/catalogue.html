<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - WebMents</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:#f5f7fb; min-height:100vh; }

        /* NAVBAR */
        .navbar {
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            padding:16px 40px; display:flex; justify-content:space-between;
            align-items:center; box-shadow:0 2px 10px rgba(0,0,0,.15);
        }
        .logo { font-size:24px; font-weight:700; color:#fff; cursor:pointer; letter-spacing:1px; }
        .logo span { color:#ffd700; }
        .back-btn {
            padding:8px 18px; background:rgba(255,255,255,.2); border:1px solid #fff;
            color:#fff; border-radius:20px; cursor:pointer; transition:.3s;
            font-family:'Poppins',sans-serif; font-size:14px; font-weight:600;
        }
        .back-btn:hover { background:#fff; color:#667eea; }

        /* CONTAINER */
        .container { max-width:1200px; margin:0 auto; padding:32px 20px; }

        /* PAGE HEADER */
        .page-header { margin-bottom:28px; }
        .page-header h1 { font-size:26px; color:#333; font-weight:700; }
        .page-header p { color:#888; margin-top:5px; font-size:14px; }

        /* PRODUCTS GRID */
        .products-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:22px;
        }
        .product-card {
            background:#fff; border-radius:14px; overflow:hidden;
            box-shadow:0 2px 10px rgba(0,0,0,.07); transition:.3s;
            border:2px solid transparent; cursor:pointer;
        }
        .product-card:hover { transform:translateY(-5px); box-shadow:0 10px 25px rgba(0,0,0,.12); border-color:#667eea; }
        .product-img { width:100%; height:180px; object-fit:cover; background:#eee; }
        .product-info { padding:16px; }
        .product-name { font-size:15px; font-weight:600; color:#333; margin-bottom:6px; }
        .product-price { font-size:20px; font-weight:700; color:#667eea; margin-bottom:4px; }
        .product-cat { font-size:12px; color:#aaa; }

        /* EMPTY STATE */
        .empty-state {
            text-align:center; padding:80px 20px; color:#bbb;
            background:#fff; border-radius:14px; box-shadow:0 2px 10px rgba(0,0,0,.06);
        }
        .empty-state .icon { font-size:60px; margin-bottom:16px; }
        .empty-state h3 { font-size:20px; color:#ccc; }

        @media(max-width:768px){
            .navbar { padding:14px 16px; }
            .container { padding:20px 12px; }
            .products-grid { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo" onclick="goHome()">Web<span>Ments</span></div>
    <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
</nav>

<!-- MAIN -->
<div class="container">
    <div class="page-header">
        <h1 id="pageTitle">📂 Catalogue</h1>
        <p id="pageSubtitle">Browse products from this manufacturer</p>
    </div>
    <div class="products-grid" id="products"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');

    function goHome() {
        const role = localStorage.getItem('role');
        if (role === 'manufacturer') location.href = '/manufacturer.html';
        else if (role === 'buyer') location.href = '/buyer.html';
        else location.href = '/index.html';
    }

    function goBack() {
        // Go back in history if possible, otherwise fall back to dashboard
        if (document.referrer && document.referrer !== window.location.href) {
            history.back();
        } else {
            const role = localStorage.getItem('role');
            location.href = role === 'manufacturer' ? '/manufacturer.html' : '/buyer.html';
        }
    }

    async function load() {
        const container = document.getElementById('products');

        // Load manufacturer name for the header
        try {
            const mfrs = await fetch('/manufacturers').then(r => r.json());
            const mfr = mfrs.find(m => m.email === email);
            if (mfr) {
                document.getElementById('pageTitle').textContent = '📂 ' + mfr.name + ' — Catalogue';
                document.getElementById('pageSubtitle').textContent = mfr.city ? '📍 ' + mfr.city : 'Browse all products';
                document.title = mfr.name + ' Catalogue - WebMents';
            }
        } catch(e) {}

        // Load products
        try {
            const res = await fetch('/products/' + email);
            const data = await res.json();

            if (!data.length) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1">
                        <div class="icon">📦</div>
                        <h3>No products listed yet</h3>
                    </div>`;
                return;
            }

            container.innerHTML = data.map(p => `
                <div class="product-card" onclick="location.href='/product.html?id=${p._id}'">
                    <img src="/uploads/${p.image}" alt="${p.name}" class="product-img"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22230%22 height=%22180%22%3E%3Crect fill=%22%23e0e0e0%22 width=%22230%22 height=%22180%22/%3E%3Ctext fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2240%22%3E📦%3C/text%3E%3C/svg%3E'">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">₹${p.price}</div>
                        <div class="product-cat">📁 ${p.category || '—'}</div>
                    </div>
                </div>`).join('');
        } catch(e) {
            container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><h3>Failed to load products</h3></div>`;
        }
    }

    load();
</script>
</body>
</html>
