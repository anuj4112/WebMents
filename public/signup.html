<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - WebMents</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 50px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .logo span {
            color: #ffd700;
        }

        /* Main Container */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signup-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .signup-header h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .signup-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .signup-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .role-option {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .role-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .role-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .role-option .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .role-option .title {
            font-weight: 600;
            font-size: 16px;
        }

        .signup-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .signup-btn:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .signup-container {
                margin: 20px;
            }

            .signup-header h2 {
                font-size: 28px;
            }

            .signup-form {
                padding: 30px 20px;
            }

            .role-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo" onclick="location.href='/index.html'">Web<span>Ments</span></div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <div class="signup-container">
            <div class="signup-header">
                <h2>Join WebMents</h2>
                <p>Start your digital journey today</p>
            </div>

            <div class="signup-form">
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <div class="form-group">
                    <label>I am a:</label>
                    <div class="role-selector">
                        <div class="role-option" onclick="selectRole('manufacturer')">
                            <div class="icon">🏭</div>
                            <div class="title">Manufacturer</div>
                        </div>
                        <div class="role-option" onclick="selectRole('buyer')">
                            <div class="icon">🛒</div>
                            <div class="title">Buyer</div>
                        </div>
                    </div>
                    <input type="hidden" id="role" value="">
                </div>

                <div class="form-group">
                    <label for="name">Business/Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Enter your city" required>
                </div>

                <div class="form-group">
                    <label for="logo">Logo/Profile Picture (Optional)</label>
                    <input type="file" id="logo" accept="image/*">
                </div>

                <button class="signup-btn" onclick="signup()">Create Account</button>

                <div class="login-link">
                    Already have an account? <a href="/login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedRole = '';

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('role').value = role;
            
            // Update UI
            document.querySelectorAll('.role-option').forEach(option => {
                option.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        async function signup() {
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const cityInput = document.getElementById('city');
            const logoInput = document.getElementById('logo');
            const roleInput = document.getElementById('role');

            // Validation
            if (!roleInput.value) {
                showError('Please select whether you are a Manufacturer or Buyer');
                return;
            }

            if (!nameInput.value || !emailInput.value || !passwordInput.value || !cityInput.value) {
                showError('Please fill in all required fields');
                return;
            }

            if (passwordInput.value.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            try {
                const formData = new FormData();
                formData.append("name", nameInput.value);
                formData.append("email", emailInput.value);
                formData.append("password", passwordInput.value);
                formData.append("role", roleInput.value);
                formData.append("city", cityInput.value);
                
                if (logoInput.files[0]) {
                    formData.append("logo", logoInput.files[0]);
                }

                const res = await fetch('/signup', {
                    method: 'POST',
                    body: formData
                });

                const msg = await res.text();

                if (msg === "User registered successfully") {
                    showSuccess('Account created successfully! Redirecting to login...');
                    setTimeout(() => {
                        location.href = "/login.html";
                    }, 2000);
                } else {
                    showError(msg);
                }
            } catch (error) {
                showError('Signup failed. Please try again.');
                console.error('Signup error:', error);
            }
        }
    </script>
</body>
</html>
